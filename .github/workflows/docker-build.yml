name: Docker Build (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CI image (CPU, validates all imports)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ci              # lightweight python:3.10-slim stage
          push: false
          tags: gpu-rag-ci:latest
          cache-from: type=gha   # cache layers between runs
          cache-to: type=gha,mode=max

      - name: Run import validation inside container
        run: |
          docker build --target ci -t gpu-rag-ci .
          docker run --rm gpu-rag-ci